<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acesso negado - Aí 'Se Cream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; flex-wrap: wrap; gap: 16px 24px; }
        nav .nav-spacer { flex: 1; min-width: 8px; }
        nav .nav-logout { margin: 0; }
        nav .btn-nav-logout {
            background: transparent; color: #e8c84a; border: 1px solid #e8c84a;
            padding: 6px 14px; border-radius: 5px; font-size: 13px; font-weight: 600;
            cursor: pointer; font-family: inherit;
        }
        nav .btn-nav-logout:hover { background: rgba(232, 200, 74, 0.15); color: #fff; border-color: #fff; }
        nav .brand { color: #e8c84a; font-size: 18px; font-weight: bold; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; }
        nav a:hover { color: #fff; }
        .container { max-width: 560px; margin: 48px auto; padding: 0 16px; }
        .card {
            background: #fff; border-radius: 8px; padding: 28px;
            box-shadow: 0 1px 4px rgba(0,0,0,0.1);
            text-align: center;
        }
        h1 { font-size: 20px; color: #1a1a2e; margin-bottom: 12px; }
        p { color: #555; font-size: 14px; line-height: 1.5; margin-bottom: 20px; }
        .btn {
            display: inline-block; padding: 10px 20px; border-radius: 5px;
            background: #1a1a2e; color: #fff; text-decoration: none; font-weight: 600; font-size: 14px;
        }
        .btn:hover { background: #2a2a4e; }
    </style>
</head>
<body>

<div th:replace="~{fragments/nav :: main}"></div>

<div class="container">
    <div class="card">
        <h1>Acesso negado</h1>
        <p>Você não tem permissão para acessar esta área. Operadores podem consultar sabores e usar lotes e baixas conforme o perfil.</p>
        <a class="btn" th:href="@{/sabores}">Ir para sabores</a>
    </div>
</div>

</body>
</html>

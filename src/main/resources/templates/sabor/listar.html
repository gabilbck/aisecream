<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabores - Aí 'Se Cream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
        nav .brand { color: #e8c84a; font-size: 18px; font-weight: bold; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; }
        nav a:hover { color: #fff; }
        .container { max-width: 960px; margin: 32px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #1a1a2e; }
        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { text-align: left; padding: 10px 12px; background: #f0f0f0; border-bottom: 2px solid #ddd; font-weight: 600; }
        td { padding: 10px 12px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #fafafa; }
        .btn { display: inline-block; padding: 8px 16px; border-radius: 5px; font-size: 13px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2a2a4e; }
        .btn-warning { background: #e8c84a; color: #1a1a2e; }
        .btn-danger { background: #e74c3c; color: #fff; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }
        .alert { padding: 12px 16px; border-radius: 6px; margin-bottom: 20px; font-size: 14px; }
        .alert-success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .alert-danger { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .header-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="/">🍦 Aí 'Se Cream</a>
    <a href="/sabores">Sabores</a>
    <a href="/lojas">Lojas</a>
    <a href="/lotes">Lotes</a>
    <a href="/distribuicoes">Distribuições</a>
    <a href="/baixas">Baixas</a>
</nav>

<div class="container">
    <div class="card">

        <div class="header-row">
            <h1>Sabores</h1>
            <a href="/sabores/novo" class="btn btn-primary">+ Novo Sabor</a>
        </div>

        <div th:if="${sucesso}" class="alert alert-success" th:text="${sucesso}"></div>
        <div th:if="${erro}" class="alert alert-danger" th:text="${erro}"></div>

        <table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Nome</th>
                    <th>Descrição</th>
                    <th>Status</th>
                    <th>Ações</th>
                </tr>
            </thead>
            <tbody>
                <tr th:if="${#lists.isEmpty(sabores)}">
                    <td colspan="5" style="text-align:center; color:#999; padding: 24px;">
                        Nenhum sabor cadastrado ainda.
                    </td>
                </tr>
                <tr th:each="sabor : ${sabores}">
                    <td th:text="${sabor.id}"></td>
                    <td th:text="${sabor.nome}"></td>
                    <td th:text="${sabor.descricao != null ? sabor.descricao : '-'}"></td>
                    <td>
                        <span th:if="${sabor.ativo}" class="badge badge-success">Ativo</span>
                        <span th:unless="${sabor.ativo}" class="badge badge-danger">Inativo</span>
                    </td>
                    <td style="display:flex; gap:6px;">
                        <a th:href="@{/sabores/editar/{id}(id=${sabor.id})}" class="btn btn-warning">Editar</a>
                        <form th:if="${sabor.ativo}"
                              th:action="@{/sabores/inativar/{id}(id=${sabor.id})}"
                              method="post"
                              onsubmit="return confirm('Deseja inativar este sabor?')">
                            <button type="submit" class="btn btn-danger">Inativar</button>
                        </form>
                    </td>
                </tr>
            </tbody>
        </table>

    </div>
</div>

</body>
</html>

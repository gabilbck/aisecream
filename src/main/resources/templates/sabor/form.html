<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sabor - Aí 'Se Cream</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: Arial, sans-serif; background: #f5f5f5; color: #333; }
        nav { background: #1a1a2e; padding: 14px 24px; display: flex; align-items: center; gap: 24px; }
        nav .brand { color: #e8c84a; font-size: 18px; font-weight: bold; text-decoration: none; }
        nav a { color: #ccc; text-decoration: none; font-size: 14px; }
        nav a:hover { color: #fff; }
        .container { max-width: 600px; margin: 32px auto; padding: 0 16px; }
        .card { background: #fff; border-radius: 8px; padding: 24px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }
        h1 { font-size: 22px; color: #1a1a2e; margin-bottom: 24px; }
        .form-group { margin-bottom: 16px; }
        label { display: block; font-size: 13px; font-weight: 600; margin-bottom: 6px; color: #555; }
        input[type="text"], textarea, select {
            width: 100%; padding: 9px 12px; border: 1px solid #ccc;
            border-radius: 5px; font-size: 14px; font-family: Arial, sans-serif;
        }
        input:focus, textarea:focus, select:focus { outline: none; border-color: #1a1a2e; }
        .error { color: #e74c3c; font-size: 12px; margin-top: 4px; }
        .btn { display: inline-block; padding: 9px 20px; border-radius: 5px; font-size: 14px; font-weight: 600; cursor: pointer; text-decoration: none; border: none; }
        .btn-primary { background: #1a1a2e; color: #fff; }
        .btn-primary:hover { background: #2a2a4e; }
        .btn-secondary { background: #aaa; color: #fff; }
        .btn-secondary:hover { background: #888; }
        .form-actions { display: flex; gap: 10px; margin-top: 24px; }
    </style>
</head>
<body>

<nav>
    <a class="brand" href="/">🍦 Aí 'Se Cream</a>
    <a href="/sabores">Sabores</a>
    <a href="/lojas">Lojas</a>
    <a href="/lotes">Lotes</a>
    <a href="/distribuicoes">Distribuições</a>
    <a href="/baixas">Baixas</a>
</nav>

<div class="container">
    <div class="card">

        <h1 th:text="${sabor.id != null ? 'Editar Sabor' : 'Novo Sabor'}"></h1>

        <form th:if="${sabor.id == null}"
              th:action="@{/sabores/novo}"
              th:object="${sabor}"
              method="post">

            <div class="form-group">
                <label for="nome">Nome *</label>
                <input type="text" id="nome" th:field="*{nome}" placeholder="Ex: Chocolate Belga" />
                <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label for="descricao">Descrição</label>
                <textarea id="descricao" th:field="*{descricao}" rows="3" placeholder="Descrição do sabor (opcional)"></textarea>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="/sabores" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>

        <form th:if="${sabor.id != null}"
              th:action="@{/sabores/editar/{id}(id=${sabor.id})}"
              th:object="${sabor}"
              method="post">

            <div class="form-group">
                <label for="nomeEdit">Nome *</label>
                <input type="text" id="nomeEdit" th:field="*{nome}" />
                <span class="error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
            </div>

            <div class="form-group">
                <label for="descricaoEdit">Descrição</label>
                <textarea id="descricaoEdit" th:field="*{descricao}" rows="3"></textarea>
            </div>

            <div class="form-group">
                <label for="ativo">Status</label>
                <select id="ativo" th:field="*{ativo}">
                    <option value="true">Ativo</option>
                    <option value="false">Inativo</option>
                </select>
            </div>

            <div class="form-actions">
                <button type="submit" class="btn btn-primary">Salvar</button>
                <a href="/sabores" class="btn btn-secondary">Cancelar</a>
            </div>
        </form>

    </div>
</div>

</body>
</html>
